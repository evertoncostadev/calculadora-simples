<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculadora Simples</h1>

    <div>
        <label for="num1">Número 1:</label>
        <input type="number" id="num1" placeholder="Digite o 1º número">
    </div>
    <br>
    <div>
        <label for="num2">Número 2:</label>
        <input type="number" id="num2" placeholder="Digite o 2º número">
    </div>
    <br>
    
    <div>
       <button onclick="calcular('+')">Somar (+)</button>
       <button onclick="calcular('-')">Subtrair (-)</button>
       <button onclick="calcular('*')">Multiplicar (*)</button>
       <button onclick="calcular('/')">Dividir (/)</button>
   </div>
   <br>
   <div>
       <h2>Resultado: <span id="resultado">0</span></h2>
   </div>

   <script src="script.js"></script>
</body>
</html>
