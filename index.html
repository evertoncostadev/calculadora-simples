<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calculadora-box">
        <h1>Calculadora</h1>

        <div class="input-group">
            <input type="number" id="num1" placeholder="Digite o 1º número">
            <input type="number" id="num2" placeholder="Digite o 2º número">
        </div>
        
        <div class="botoes-grid">
           <button onclick="calcular('+')">+</button>
           <button onclick="calcular('-')">-</button>
           <button onclick="calcular('*')">×</button>
           <button onclick="calcular('/')">÷</button>
       </div>

       <div class="visor-resultado">
           <span>Resultado:</span>
           <div id="resultado">0</div>
       </div>
   </div>

   <script src="script.js"></script>
</body>
</html>
